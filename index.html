<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KBZ Board (iPad 2)</title>
  <style>
    body{
      margin:0; background:#000; color:#eaeaea;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }
    .wrap{ max-width:900px; margin:0 auto; padding:10px; }

    /* Header */
    .hdr{
      display:flex; justify-content:space-between; align-items:center;
      padding:8px 10px; border:1px solid #1c1c1c; border-radius:10px;
      background:#0b0b0b; margin-bottom:10px;
    }
    .hdr .left{ font-size:13px; opacity:.95; }
    .hdr .right{ font-size:13px; opacity:.9; white-space:nowrap; }

    /* Table-like list */
    .list{
      border:1px solid #1c1c1c; border-radius:10px; overflow:hidden;
      background:#0b0b0b;
    }
    .row{
      display:flex; justify-content:space-between; align-items:center;
      padding:10px 10px;
      border-top:1px solid #1c1c1c;
    }
    .row:first-child{ border-top:none; }
    .name{ font-size:13px; font-weight:600; opacity:.95; }
    .handle{ font-size:11px; opacity:.65; margin-top:2px; }

    .nums{ text-align:right; }
    .now{ font-size:22px; font-weight:800; letter-spacing:.3px; line-height:1.1; }
    .delta{ font-size:12px; opacity:.85; margin-top:3px; }

    /* simple sign coloring (optional; if ignored, still ok) */
    .pos{ color:#7CFF8A; }
    .neg{ color:#FF7C7C; }
    .neu{ opacity:.7; }

    .note{ font-size:11px; opacity:.6; text-align:center; margin-top:8px; }
    code{ font-size:11px; opacity:.75; }
  </style>
</head>
<body>
<div class="wrap">

  <!-- ===== EDIT HERE ===== -->
  <script>
    const state = {
      lastUpdated: "2026-03-01",
      coin: 651,        // 🪙 value
      coinLabel: "🪙",  // dacă nu se vede pe iPad 2, schimbă în "AG" sau "O"
      platforms: [
        { name:"YouTube Main",  handle:"Killer Bananaz",      current:37000, prev:36988 },
        { name:"YouTube Clips", handle:"KBZ Clips",           current:0,     prev:0     },
        { name:"YouTube VODs",  handle:"KBZ VODs",            current:0,     prev:0     },
        { name:"Twitch",        handle:"killerbananazarmy",   current:63000, prev:62992 },
        { name:"TikTok",        handle:"@killerbananaz",      current:15587, prev:15570 },
        { name:"Instagram",     handle:"@killerbananaz",      current:1131,  prev:1129  },
        { name:"Facebook",      handle:"Killer Bananaz",      current:1200,  prev:1198  }
      ]
    };
  </script>
  <!-- ===== STOP EDIT HERE ===== -->

  <div class="hdr">
    <div class="left">
      TOTAL: <strong id="totalNow">—</strong>
      <span style="opacity:.6;"> | </span>
      Δ <strong id="totalDelta">—</strong>
      <span style="opacity:.6;"> | </span>
      Last: <strong id="lastUpdated">—</strong>
    </div>
    <div class="right">
      <span id="coinLabel">🪙</span> <strong id="coin">—</strong>
    </div>
  </div>

  <div class="list" id="list"></div>

  <div class="note">
    Update: copiezi vechiul <code>current</code> în <code>prev</code>, pui noul <code>current</code>, schimbi <code>lastUpdated</code>.
  </div>

</div>

<script>
  function fmt(n){ return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ","); }
  function deltaHTML(d){
    if(d>0) return `<span class="pos">+${fmt(d)}</span>`;
    if(d<0) return `<span class="neg">${fmt(d)}</span>`;
    return `<span class="neu">0</span>`;
  }

  document.getElementById("lastUpdated").textContent = state.lastUpdated;
  document.getElementById("coin").textContent = fmt(state.coin);
  document.getElementById("coinLabel").textContent = state.coinLabel;

  let totalNow=0, totalPrev=0;
  const list = document.getElementById("list");

  state.platforms.forEach(p=>{
    const now = p.current||0, prev = p.prev||0;
    const d = now - prev;
    totalNow += now; totalPrev += prev;

    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `
      <div>
        <div class="name">${p.name}</div>
        <div class="handle">${p.handle}</div>
      </div>
      <div class="nums">
        <div class="now">${fmt(now)}</div>
        <div class="delta">Δ ${deltaHTML(d)}</div>
      </div>
    `;
    list.appendChild(row);
  });

  const totalD = totalNow - totalPrev;
  document.getElementById("totalNow").textContent = `— ${fmt(totalNow)}`;
  document.getElementById("totalDelta").innerHTML = totalD>=0 ? `+${fmt(totalD)}` : `${fmt(totalD)}`;
</script>

</body>
</html>
