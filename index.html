<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KBZ Board</title>
  <style>
    :root { color-scheme: dark; }
    body{
      margin:0;background:#000;color:#eaeaea;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }
    .wrap{max-width:900px;margin:0 auto;padding:12px;}
    .top{
      display:flex;justify-content:space-between;align-items:center;gap:10px;
      margin-bottom:12px;
    }
    .top .meta{font-size:13px;opacity:.9;letter-spacing:.2px;}
    .top .coin{font-size:13px;opacity:.8;white-space:nowrap;}
    .grid{display:grid;grid-template-columns:1fr;gap:10px;}
    @media(min-width:820px){.grid{grid-template-columns:1fr 1fr;}}
    .card{
      background:#0b0b0b;border:1px solid #1c1c1c;border-radius:12px;
      padding:12px;
    }
    .h{
      display:flex;justify-content:space-between;align-items:baseline;gap:10px;
      margin-bottom:8px;
    }
    .h .name{font-size:13px;font-weight:600;opacity:.9;}
    .h .handle{font-size:12px;opacity:.65;}
    .num{font-size:34px;font-weight:800;letter-spacing:.4px;line-height:1.1;}
    .delta{font-size:12px;margin-top:6px;opacity:.85;}
    .delta .pos{color:#7CFF8A;} /* nu e critic dacă Safari vechi ignoră culorile */
    .delta .neg{color:#FF7C7C;}
    .delta .neu{opacity:.7;}
    .row{
      display:flex;justify-content:space-between;align-items:center;gap:10px;
      margin-top:10px;padding-top:10px;border-top:1px solid #1c1c1c;
      font-size:12px;opacity:.8;
    }
    .note{font-size:11px;opacity:.6;text-align:center;margin-top:10px;}
    .btn{
      background:#111;border:1px solid #222;color:#ddd;border-radius:10px;
      padding:8px 10px;font-size:12px;cursor:pointer;
    }
  </style>
</head>

<body>
<div class="wrap">

  <!-- ====== EDIT HERE (doar aici umbli) ====== -->
  <script>
    const state = {
      lastUpdated: "2026-03-01", // schimbă când faci update
      coin: 651,                 // 🪙 (Babilon) - manual

      // Setezi CURRENT și PREV (ultima valoare salvată)
      platforms: [
        { key: "yt_main", name: "YouTube Main", handle: "@KillerBananaz", current: 37000, prev: 36988 },
        { key: "yt_clips", name: "YouTube Clips", handle: "@KillerBananazClips", current: 0, prev: 0 },
        { key: "yt_vods", name: "YouTube VODs", handle: "@KillerBananazVODs", current: 0, prev: 0 },

        { key: "twitch", name: "Twitch", handle: "KillerBananazArmy", current: 63000, prev: 62992 },
        { key: "tiktok", name: "TikTok", handle: "@killerbananaz", current: 15587, prev: 15570 },
        { key: "instagram", name: "Instagram", handle: "@killerbananaz", current: 1131, prev: 1129 },
        { key: "facebook", name: "Facebook", handle: "Killer Bananaz", current: 1200, prev: 1198 }
      ]
    };
  </script>
  <!-- ====== STOP EDIT HERE ====== -->

  <div class="top">
    <div class="meta">
      TOTAL FOLLOWERS: <strong id="totalNow">—</strong>
      <span style="opacity:.6;"> | Last: </span><strong id="lastUpdated">—</strong>
    </div>
    <div class="coin">🪙 <strong id="coin">—</strong></div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="note">
    Update flow: pui valorile noi în <code>current</code>, copiezi vechiul <code>current</code> în <code>prev</code>, apoi schimbi <code>lastUpdated</code>.
  </div>

</div>

<script>
  function fmt(n){
    // formatare cu virgulă la mii (merge ok pe iOS vechi)
    return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  }

  function deltaBadge(d){
    if (d > 0) return `<span class="pos">+${fmt(d)}</span>`;
    if (d < 0) return `<span class="neg">${fmt(d)}</span>`;
    return `<span class="neu">0</span>`;
  }

  // populate top
  document.getElementById("lastUpdated").textContent = state.lastUpdated;
  document.getElementById("coin").textContent = fmt(state.coin);

  // build cards
  const grid = document.getElementById("grid");

  let totalNow = 0;
  let totalPrev = 0;

  state.platforms.forEach(p => {
    totalNow += (p.current || 0);
    totalPrev += (p.prev || 0);

    const d = (p.current || 0) - (p.prev || 0);

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="h">
        <div>
          <div class="name">${p.name}</div>
          <div class="handle">${p.handle}</div>
        </div>
      </div>
      <div class="num">${fmt(p.current || 0)}</div>
      <div class="delta">Δ since last: ${deltaBadge(d)}</div>
      <div class="row">
        <div>Prev: <strong>${fmt(p.prev || 0)}</strong></div>
        <div>Now: <strong>${fmt(p.current || 0)}</strong></div>
      </div>
    `;
    grid.appendChild(card);
  });

  // totals
  document.getElementById("totalNow").textContent = `— ${fmt(totalNow)}`;
  // dacă vrei și delta total, adaug aici:
  const totalDelta = totalNow - totalPrev;
  document.getElementById("totalNow").innerHTML = `— ${fmt(totalNow)} <span style="opacity:.65;font-size:12px;">(Δ ${totalDelta>0?"+":""}${fmt(totalDelta)})</span>`;
</script>

</body>
</html>
